<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Contact eMerge Solutions to discuss your Acumatica or NetSuite needs." />
  <title>Contact Us | eMerge Solutions</title>
  <link rel="stylesheet" href="style.css" />
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ContactPage",
      "name": "Contact eMerge Solutions",
      "url": "https://example.com/contact.html",
      "potentialAction": {
        "@type": "CommunicateAction",
        "target": "mailto:info@example.com",
        "result": "Request a consultation"
      }
    }
  </script>
</head>
<body>
  <nav>
    <div><strong>eMerge Solutions</strong></div>
    <ul>
      <li><a href="/normal.html">Home</a></li>
      <li><a href="/stabilization.html">Stabilization</a></li>
      <li><a href="/optimization.html">Optimization</a></li>
      <li><a href="/rescue.html">Rescue</a></li>
      <li><a href="/technical-debt.html">Technical Debt</a></li>
      <li><a href="/contact.html">Contact</a></li>
    </ul>
  </nav>
  <main>
    <h1>Contact Us</h1>
    <p>Please fill out the form below and a consultant will get back to you within one business day.</p>
    <form id="contact-form">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" required />
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required />
      <label for="message">How can we help?</label>
      <textarea id="message" name="message" rows="5" required></textarea>
      <button type="submit">Submit</button>
    </form>
    <div id="form-status" style="margin-top:1rem;"></div>
  </main>
  <footer>
    <p>&copy; 2026 eMerge Solutions. All rights reserved.</p>
  </footer>
  <script src="script.js"></script>
  <script>
    // Contact form submission with confirmation
    const form = document.getElementById('contact-form');
    form.addEventListener('submit', function(event) {
      event.preventDefault();
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const message = document.getElementById('message').value;
      // Confirm before submitting to avoid misaddressed emails or spam
      const confirmed = confirm(`Submit your request to eMerge?\nName: ${name}\nEmail: ${email}\nMessage: ${message}`);
      if (!confirmed) return;
      // In real deployment, use fetch() to send to backend; here we simulate success
      document.getElementById('form-status').textContent = 'Thank you! Your request has been submitted. We will be in touch shortly.';
      form.reset();
    });
  </script>
</body>
</html>
