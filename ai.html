<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="An immersive AI consultant for NetSuite — voice or text. Find the right connector, scope an implementation, or book a call." />
  <link rel="stylesheet" href="/assets/style.css" />
  <link rel="canonical" href="https://emerge-solutions.example/ai" />
  <title>eMerge AI Consultant</title>
</head>
<body class="ai-page">
  <canvas id="ai-bg-canvas" aria-hidden="true"></canvas>

  <div class="ai-shell">
    <header class="ai-topbar">
      <a href="/" aria-label="Back to classic site">← Back to site</a>
      <span class="ai-brand">eMerge · NetSuite Concierge</span>
      <button id="ai-mute" type="button" aria-pressed="false" title="Toggle voice replies">🔊 Voice off</button>
    </header>

    <section class="ai-stage-immersive" aria-label="AI consultant">
      <div class="orb" id="orb" data-state="idle">
        <span class="glow"></span>
        <span class="ring r3"></span>
        <span class="ring r2"></span>
        <span class="ring r1"></span>
        <span class="core"></span>
        <canvas class="orb-wave" id="orb-wave" aria-hidden="true"></canvas>
      </div>

      <div class="ai-utterance" id="ai-utterance" aria-live="polite"></div>
      <button class="ai-history-toggle" id="ai-history-toggle" type="button">Show history</button>
      <div class="ai-history" id="ai-history" aria-label="Conversation history"></div>

      <div class="ai-suggestions" id="ai-suggestions"></div>

      <div class="ai-input-bar">
        <button id="ai-mic" type="button" aria-pressed="false" aria-label="Hold to speak">🎤</button>
        <input id="ai-input" type="text" placeholder="Type, or tap the mic to speak…" autocomplete="off" />
        <button id="ai-send" class="primary" type="button" aria-label="Send">Send →</button>
      </div>
    </section>
  </div>

  <script src="/assets/ai-engine.js"></script>
  <script src="/assets/ai-immersive.js"></script>
</body>
</html>
